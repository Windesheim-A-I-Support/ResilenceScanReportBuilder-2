name: CI / Release

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Hello
        run: echo "alive"

  version-check:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check version
        id: check
        run: |
          VERSION=$(python - <<'EOF'
          import re
          m = re.search(r'^version\s*=\s*["\']([^"\']+)', open('pyproject.toml').read(), re.M)
          print(m.group(1) if m else '')
          EOF
          )
          if [ -z "$VERSION" ]; then echo "release=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if git tag --list | grep -qx "v${VERSION}"; then
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version-check
    if: needs.version-check.outputs.release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: ubuntu-latest
            artifact: linux
    runs-on: ${{ matrix.os }}
    env:
      APP_VERSION: ${{ needs.version-check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set repo name
        shell: bash
        run: echo "REPO_NAME=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"
      - name: Build placeholder
        run: echo "build ${{ matrix.artifact }}"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact }}
          path: dist/*
          if-no-files-found: ignore

  publish:
    needs: [version-check, build]
    if: needs.version-check.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          name: v${{ needs.version-check.outputs.version }}
          generate_release_notes: true
          files: release-assets/*
